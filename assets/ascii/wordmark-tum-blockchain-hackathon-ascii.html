<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TUM Blockchain &amp; AI Hackathon ASCII Wordmark Preview</title>
    <style>
      :root {
        --tbc-yellow: #ffc110;
        --tbc-red: #f44336;
        --tbc-purple: #6f3de2;
        --tbc-black: #000000;
        --tbc-warm-white: #f9e6e1;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: clamp(24px, 6vw, 80px);
        color: var(--tbc-warm-white);
        background:
          radial-gradient(900px 620px at 18% 18%, rgba(255, 193, 16, 0.28), transparent 58%),
          radial-gradient(920px 620px at 36% 54%, rgba(244, 67, 54, 0.32), transparent 60%),
          radial-gradient(900px 680px at 78% 34%, rgba(111, 61, 226, 0.28), transparent 62%),
          linear-gradient(135deg, #000000 0%, #22100b 35%, #3a172d 100%);
        font-family: "Courier New", Consolas, monospace;
      }

      main {
        width: min(100%, 1180px);
      }

      img {
        display: block;
        width: 100%;
        height: auto;
        filter: drop-shadow(0 24px 56px rgba(0, 0, 0, 0.55));
      }

      p {
        margin: 18px 0 0;
        color: rgba(249, 230, 225, 0.72);
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="./wordmark-tum-blockchain-hackathon-ascii.svg" alt="TUM Blockchain and AI Hackathon ASCII wordmark">
      <p>Local hero ASCII wordmark preview on a dark TBC-safe background.</p>
    </main>
  </body>
</html>
